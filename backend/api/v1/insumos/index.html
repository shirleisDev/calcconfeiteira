<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Busca de Insumos</title>
   <style>
    body {
        background-color: #0b0e14;
        color: #e0e0e0;
        font-family: 'Segoe UI', Arial, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center; /* Centraliza o conteúdo horizontalmente */
        padding: 40px 0;
    }

    /* O segredo da centralização está aqui */
    .container-principal {
        width: 60%; /* Ocupa 60% da largura da tela */
        min-width: 400px; /* Não deixa ficar muito fino em telas pequenas */
        background: #161b22;
        padding: 40px;
        border-radius: 15px;
        border: 1px solid #30363d;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1, h3 {
        color: #58a6ff;
        text-align: center;
        font-size: 2.2rem; /* Fonte grande para o título */
    }

    p, span, li {
        font-size: 1.2rem; /* Aumenta o tamanho do texto comum */
        line-height: 1.6;
    }

    .status-card {
        background: #0d1117;
        border-left: 6px solid #238636;
        padding: 20px;
        margin-top: 20px;
        border-radius: 8px;
    }

    pre {
        background: #000;
        padding: 15px;
        border-radius: 5px;
        overflow-x: auto;
        color: #7ee787;
        font-size: 1rem;
    }
</style>


</head>
<body>

    <h2>🔍 Buscar Insumos</h2>
    <!-- O evento 'input' faz a busca enquanto você digita -->
    <input type="text" id="campoBusca" placeholder="Ex: Chocolate, Farinha..." oninput="buscar()">
<form method="GET" action="../backend/index.php">

    <div id="lista">
        <!-- Os resultados aparecerão aqui -->
    </div>

    <script>
        async function buscar() {
            const termo = document.getElementById('campoBusca').value;
            const lista = document.getElementById('lista');
            
            // Substitua 'busca.php' pelo nome real do seu arquivo PHP
            try {
                const response = await fetch(`buscar.php?q=${termo}`);
                const res = await response.json();

                if (res.status === "sucesso") {
                    lista.innerHTML = res.dados.map(item => `
                        <div class="item">
                            <strong>${item.nome_item}</strong>
                            <span class="preco">R$ ${parseFloat(item.preco_total).toFixed(2)}</span>
                            <div class="meta">
                                Peso: ${item.peso_total}g | 
                                Custo/g: <strong>R$ ${parseFloat(item.custo_por_grama).toFixed(4)}</strong>
                            </div>
                        </div>
                    `).join('');
                    
                    if (res.total_encontrado === 0) {
                        lista.innerHTML = '<p>Nenhum insumo encontrado.</p>';
                    }
                }
            } catch (erro) {
                console.error("Erro na busca:", erro);
            }
        }

        // Carrega tudo ao abrir a página
        buscar();
    </script>
</body>
</html>
